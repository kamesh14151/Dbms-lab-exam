<!DOCTYPE html>
<html>
<head>
  <title>Hotel Management</title>
</head>
<body>
<h2>Hotel Bookings</h2>
<button onclick="loadData()">Load Bookings</button>
<p id="status"></p>
<table border="1" id="table">
  <thead><tr><th>Name</th><th>Room</th><th>Days</th></tr></thead>
  <tbody></tbody>
</table>
<script>
async function loadData() {
  const table = document.querySelector("#table tbody"), status = document.getElementById("status");
  status.textContent = "Loading...";
  try {
    const res = await fetch("http://localhost:3000/bookings");
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    table.innerHTML = data.map(b => `<tr><td>${b.name}</td><td>${b.room}</td><td>${b.days}</td></tr>`).join("");
    status.textContent = data.length ? "Loaded " + data.length + " booking(s)." : "No bookings found.";
  } catch (err) {
    table.innerHTML = "";
    status.textContent = "Could not load bookings. Start backend with: cd backend && node server.js";
  }
}
loadData();
</script>
</body>
</html>
