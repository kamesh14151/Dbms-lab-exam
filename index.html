<!DOCTYPE html>
<title>Hotel</title><h2>Bookings</h2>
<form id=f onsubmit="return add(event)">
<input id=n placeholder=Name required><input id=r type=number placeholder=Room required>
<input id=d type=number placeholder=Days required><button>Add</button><button type=button onclick=load()>Load</button></form>
<p id=s></p><table border=1><thead><tr><th>Name<th>Room<th>Days</tr></thead><tbody id=t></tbody></table>
<script>
const API="http://localhost:3000/bookings",$=id=>document.getElementById(id);
async function load(){s.textContent="Loading...";try{let a=await (await fetch(API)).json();t.innerHTML=a.map(b=>`<tr><td>${b.name}<td>${b.room}<td>${b.days}</tr>`).join("");s.textContent=`${a.length} booking(s)`}catch{s.textContent="Start backend: node server.js";t.innerHTML=""}}
async function add(e){e.preventDefault();try{await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:n.value.trim(),room:+r.value,days:+d.value})});f.reset();s.textContent="Added";load()}catch{s.textContent="Add failed"}return false}
load();
</script>
